services:

  # ── Storage ────────────────────────────────────────────────────────────────

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Passed to postgres-init.sh to create the terramind_app role.
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Creates terramind_app role on fresh volume. Only runs once — see RUNBOOK §2.
      - ./backend/scripts/postgres-init.sh:/docker-entrypoint-initdb.d/01-create-app-role.sh:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${LANGFUSE_DB_USER}
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD}
      POSTGRES_DB: ${LANGFUSE_DB_NAME}
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LANGFUSE_DB_USER} -d ${LANGFUSE_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Secrets ────────────────────────────────────────────────────────────────

  vault:
    image: hashicorp/vault:1.17
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    cap_add:
      - IPC_LOCK
    ports:
      - "${VAULT_PORT:-8200}:8200"
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  vault-init:
    image: hashicorp/vault:1.17
    depends_on:
      vault:
        condition: service_healthy
    restart: "no"
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        vault kv put secret/terra-mind/anthropic api_key="$$ANTHROPIC_API_KEY"
        vault kv put secret/terra-mind/jwt signing_key="$$JWT_SIGNING_KEY"

  # ── Tracing ────────────────────────────────────────────────────────────────

  langfuse:
    image: langfuse/langfuse:2.95.11
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "${LANGFUSE_PORT:-3001}:3000"
    environment:
      DATABASE_URL: postgresql://${LANGFUSE_DB_USER}:${LANGFUSE_DB_PASSWORD}@langfuse-db:5432/${LANGFUSE_DB_NAME}
      NEXTAUTH_URL: http://localhost:${LANGFUSE_PORT:-3001}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      SALT: ${LANGFUSE_SALT}
      HOSTNAME: "0.0.0.0"
      # Seeds a default org, project, user, and API keys on fresh volume init.
      # All six vars must be set together — Langfuse skips seeding if any is absent.
      # Values must match LANGFUSE_PUBLIC_KEY / LANGFUSE_SDK_SECRET_KEY in the api service.
      LANGFUSE_INIT_ORG_ID: terra-mind-org
      LANGFUSE_INIT_ORG_NAME: terra-mind
      LANGFUSE_INIT_PROJECT_ID: terra-mind-project
      LANGFUSE_INIT_PROJECT_NAME: terra-mind
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SDK_SECRET_KEY}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL}
      LANGFUSE_INIT_USER_NAME: admin
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/public/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  # ── Backend ────────────────────────────────────────────────────────────────

  migrate:
    build:
      context: backend
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    environment:
      # Superuser DSN — migrate connects as terramind (owner) to create tables and apply RLS.
      DATABASE_URL: ${DATABASE_URL_MIGRATE}
    command: ["alembic", "upgrade", "head"]

  api:
    build:
      context: backend
    depends_on:
      vault-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
      langfuse:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      # App-role DSN — connects as terramind_app (non-superuser); RLS is enforced.
      DATABASE_URL: ${DATABASE_URL}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID}
      # Project SDK keys — must match LANGFUSE_INIT_PROJECT_* in the langfuse service.
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SDK_SECRET_KEY}
      LANGFUSE_HOST: http://langfuse:3000
      EVAL_THRESHOLDS_PATH: /app/eval_thresholds.yaml
    volumes:
      - ./eval_thresholds.yaml:/app/eval_thresholds.yaml:ro
      # Cargo items.json for class detection (D-026). Gitignored data lives on a
      # host volume (D-014); read-only — the api only reads it, scrape runs host-side.
      - ./backend/data/raw:/app/data/raw:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 12
      # Lifespan boot (Vault → embedding model → Cargo) can run well past the ~140s
      # nominal on a cold `up --build` (concurrent image builds + a loaded host).
      # Generous grace so api flips healthy *during* start_period and the frontends
      # (depends_on api: service_healthy) are never skipped. Proven by a cold
      # `down && up --build`. (150s false-alarmed under build contention.)
      start_period: 240s

  # ── Worker (background jobs) ────────────────────────────────────────────────

  # RQ worker for the operator-triggered re-rag job (D-033). Same image as api;
  # runs jobs independently of the api (a re-rag survives an api restart). It
  # needs only the DB, the embedding model, and the cached corpus — NO Vault.
  worker:
    build:
      context: backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Long-running; come back if it crashes (the api restarting must not kill jobs).
    restart: unless-stopped
    environment:
      # App-role DSN — the re-rag job upserts rag_chunks (shared corpus, RLS-exempt).
      DATABASE_URL: ${DATABASE_URL}
      # Broker — the same Redis the api enqueues onto; the `rq` CLI reads this for --url.
      RQ_REDIS_URL: redis://redis:6379/0
    volumes:
      # Re-rag reads pages/ + cargo/ and writes manifest.json → read-WRITE (api is :ro).
      - ./backend/data/raw:/app/data/raw
    command: ["rq", "worker", "rerag"]

  # ── Frontends ──────────────────────────────────────────────────────────────

  frontend-admin:
    build:
      context: frontend-admin
    depends_on:
      api:
        condition: service_healthy
    environment:
      # Server-side calls (httpx from the Streamlit process) → the api service.
      API_BASE_URL: http://api:8000
    ports:
      - "${FRONTEND_ADMIN_PORT:-8501}:8501"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend-user:
    build:
      context: frontend-user
      args:
        # Baked into the bundle at build time; the browser (on the host) calls
        # the host-mapped API. Override via VITE_API_BASE_URL.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_USER_PORT:-5173}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  langfuse-db-data:
  redis-data:
